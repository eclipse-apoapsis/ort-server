gitHubHttpClient {
  connectTimeoutMs = ${?GITHUB_HTTP_CLIENT_CONNECT_TIMEOUT_MS}
  socketTimeoutMs = ${?GITHUB_HTTP_CLIENT_SOCKET_TIMEOUT_MS}
  requestTimeoutMs = ${?GITHUB_HTTP_CLIENT_REQUEST_TIMEOUT_MS}
  maxRetries = ${?GITHUB_HTTP_CLIENT_MAX_RETRIES}
  retryDelayMs = ${?GITHUB_HTTP_CLIENT_RETRY_DELAY_MS}
  retryExponentialBackoff = ${?GITHUB_HTTP_CLIENT_RETRY_EXPONENTIAL_BACKOFF}

  rateLimit {
    maxRetries = ${?GITHUB_HTTP_CLIENT_RATE_LIMIT_MAX_RETRIES}
    defaultDelayMs = ${?GITHUB_HTTP_CLIENT_RATE_LIMIT_DEFAULT_DELAY_MS}
    maxDelayMs = ${?GITHUB_HTTP_CLIENT_RATE_LIMIT_MAX_DELAY_MS}
    delayStrategy = ${?GITHUB_HTTP_CLIENT_RATE_LIMIT_DELAY_STRATEGY}
  }
}

