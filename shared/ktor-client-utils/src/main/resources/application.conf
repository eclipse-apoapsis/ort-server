httpClient {
    connectTimeoutMs = 10000
    connectTimeoutMs = ${?HTTP_CLIENT_CONNECT_TIMEOUT_MS}

    socketTimeoutMs = 30000
    socketTimeoutMs = ${?HTTP_CLIENT_SOCKET_TIMEOUT_MS}

    requestTimeoutMs = 60000
    requestTimeoutMs = ${?HTTP_CLIENT_REQUEST_TIMEOUT_MS}

    maxRetries = 3
    maxRetries = ${?HTTP_CLIENT_MAX_RETRIES}

    retryDelayMs = 1000
    retryDelayMs = ${?HTTP_CLIENT_RETRY_DELAY_MS}

    retryExponentialBackoff = true
    retryExponentialBackoff = ${?HTTP_CLIENT_RETRY_EXPONENTIAL_BACKOFF}

    rateLimit {
        maxRetries = 5
        maxRetries = ${?HTTP_RATE_LIMIT_MAX_RETRIES}

        defaultDelayMs = 1000
        defaultDelayMs = ${?HTTP_RATE_LIMIT_DEFAULT_DELAY_MS}

        maxDelayMs = 60000
        maxDelayMs = ${?HTTP_RATE_LIMIT_MAX_DELAY_MS}

        delayStrategy = BACKOFF
        delayStrategy = ${?HTTP_RATE_LIMIT_DELAY_STRATEGY}
    }
}
