secretsProvider {
  scwServerUrl = ${?SCW_SERVER_URL}
  scwApiVersion = ${?SCW_API_VERSION}
  scwRegion = ${?SCW_REGION}
  scwSecretKey = ${?SCW_SECRET_KEY}
  scwProjectId = ${?SCW_PROJECT_ID}
}

scalewayHttpClient {
  connectTimeoutMs = ${?SCALEWAY_HTTP_CLIENT_CONNECT_TIMEOUT_MS}
  socketTimeoutMs = ${?SCALEWAY_HTTP_CLIENT_SOCKET_TIMEOUT_MS}
  requestTimeoutMs = ${?SCALEWAY_HTTP_CLIENT_REQUEST_TIMEOUT_MS}
  maxRetries = ${?SCALEWAY_HTTP_CLIENT_MAX_RETRIES}
  retryDelayMs = ${?SCALEWAY_HTTP_CLIENT_RETRY_DELAY_MS}
  retryExponentialBackoff = ${?SCALEWAY_HTTP_CLIENT_RETRY_EXPONENTIAL_BACKOFF}

  rateLimit {
    maxRetries = ${?SCALEWAY_HTTP_CLIENT_RATE_LIMIT_MAX_RETRIES}
    defaultDelayMs = ${?SCALEWAY_HTTP_CLIENT_RATE_LIMIT_DEFAULT_DELAY_MS}
    maxDelayMs = ${?SCALEWAY_HTTP_CLIENT_RATE_LIMIT_MAX_DELAY_MS}
    delayStrategy = ${?SCALEWAY_HTTP_CLIENT_RATE_LIMIT_DELAY_STRATEGY}
  }
}
